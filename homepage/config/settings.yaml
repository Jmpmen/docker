---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/settings/

providers:
  openweathermap: openweathermapapikey
  weatherapi: weatherapiapikey

theme: dark
color: slate
target: _blank

layout:
  Network:
    icon: mdi-web.svg
    style: row
    columns: 2
  Services:
    icon: mdi-server.svg
    Group A:
      header: false
      style: row
      columns: 2
    Group B:
      header: false
      style: row
      columns: 4
  Cameras:
    icon: mdi-cctv.svg
    style: row
    columns: 3